<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Đăng ký tài xế - Xe Nhà</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-asphalt-900:#12161D;
    --surface-800:#1C2129;
    --surface-700:#262D38;
    --border-steel:#3A4453;
    --text-fog:#ECEFF3;
    --text-muted:#8B93A1;
    --text-dim:#5C6472;
    --accent-amber:#F2A93B;
    --route-green:#34C77B;
    --route-green-dim:rgba(52,199,123,0.14);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; }
  body{
    font-family:'Be Vietnam Pro', sans-serif;
    background:var(--bg-asphalt-900);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:0;
  }
  .wrap{ width:100%; max-width:440px; padding:36px 22px 40px; }
  .logo{ font-size:44px; text-align:center; margin-bottom:10px; }
  h1{ font-size:22px; font-weight:800; color:var(--text-fog); text-align:center; }
  .sub{ font-size:13px; color:var(--text-muted); text-align:center; margin-top:8px; margin-bottom:30px; line-height:1.55; }
  .field-label{ font-size:11.5px; color:var(--text-muted); font-weight:600; margin-bottom:7px; display:block; }
  .input-row{ background:var(--surface-800); border:1px solid var(--border-steel); border-radius:14px;
    padding:13px 15px; margin-bottom:16px; }
  .input-row input{ width:100%; background:transparent; border:none; outline:none; color:var(--text-fog);
    font-size:14.5px; font-family:inherit; }
  .input-row input::placeholder{ color:var(--text-dim); }
  .btn-full{ width:100%; background:var(--accent-amber); color:#1A1200; border:none; font-weight:700;
    font-size:14.5px; padding:14px 0; border-radius:12px; font-family:inherit; cursor:pointer; margin-top:6px; }
  .btn-full:disabled{ opacity:0.6; }
  .success-box{ display:none; background:var(--route-green-dim); color:var(--route-green); border-radius:14px;
    padding:16px; text-align:center; font-size:13.5px; font-weight:600; line-height:1.5; margin-top:18px; }
  .terms{ font-size:10.5px; color:var(--text-dim); text-align:center; margin-top:16px; line-height:1.5; }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">🚕</div>
  <h1>Đăng ký hồ sơ tài xế</h1>
  <div class="sub">Dành riêng cho tài xế trong đội xe · Xe Nhà</div>

  <span class="field-label">Họ và tên</span>
  <div class="input-row"><input type="text" id="d-name" placeholder="VD: Nguyễn Văn A"></div>

  <span class="field-label">Loại xe + biển số</span>
  <div class="input-row"><input type="text" id="d-car" placeholder="VD: Innova · 51H-889.12"></div>

  <span class="field-label">Số điện thoại liên hệ</span>
  <div class="input-row"><input type="text" id="d-phone" placeholder="090 xxx xxxx"></div>

  <button class="btn-full" id="d-submit" onclick="submitDriver()">Đăng ký</button>

  <div class="success-box" id="d-success">✓ Đã gửi đăng ký thành công! Quản lý sẽ liên hệ lại với bạn sớm.</div>

  <div class="terms">Thông tin này chỉ dùng nội bộ để quản lý đội xe.</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBb8uSsLuChx4OYONl2fFFFwDSbSncZBpI",
    authDomain: "hainguyen-ffb25.firebaseapp.com",
    projectId: "hainguyen-ffb25",
    storageBucket: "hainguyen-ffb25.firebasestorage.app",
    messagingSenderId: "837257334024",
    appId: "1:837257334024:web:583b46747d823b4c83f0bd",
    measurementId: "G-1CC6JB312T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.__driverFirebaseReady = true;

  window.submitDriver = async function(){
    const btn = document.getElementById('d-submit');
    const name = document.getElementById('d-name').value.trim();
    const car = document.getElementById('d-car').value.trim();
    const phone = document.getElementById('d-phone').value.trim();

    if (!name) { alert('Bạn nhập họ tên trước nhé.'); return; }
    if (!car) { alert('Bạn nhập loại xe và biển số trước nhé.'); return; }
    if (!phone) { alert('Bạn nhập số điện thoại liên hệ trước nhé.'); return; }

    btn.textContent = 'Đang gửi...';
    btn.disabled = true;

    try {
      await addDoc(collection(db, "drivers"), {
        name: name,
        car: car,
        phone: phone,
        status: 'ready',
        createdAt: serverTimestamp()
      });
      document.getElementById('d-name').value = '';
      document.getElementById('d-car').value = '';
      document.getElementById('d-phone').value = '';
      document.getElementById('d-success').style.display = 'block';
    } catch (err) {
      console.error('Không đăng ký được:', err);
      alert('Có lỗi khi đăng ký, thử lại nhé.');
    }
    btn.textContent = 'Đăng ký';
    btn.disabled = false;
  };
</script>

</body>
</html>
