<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Đối tác - Xe Nhà</title>
<meta name="theme-color" content="#12161D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-asphalt-900:#12161D;
    --surface-800:#1C2129;
    --surface-700:#262D38;
    --border-steel:#3A4453;
    --text-fog:#ECEFF3;
    --text-muted:#8B93A1;
    --accent-amber:#F2A93B;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{ height:100%; }
  body{
    font-family:'Be Vietnam Pro', sans-serif;
    background: radial-gradient(ellipse at 25% -10%, #1B4A30 0%, transparent 45%), var(--bg-asphalt-900);
    min-height:100vh; color:var(--text-fog);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .wrap{ width:100%; max-width:420px; text-align:center; }
  .logo-icon{ width:110px; height:110px; border-radius:26px; margin:0 auto 18px; display:block; object-fit:cover; }
  h1{ font-size:26px; font-weight:800; }
  .sub{ font-size:14px; color:var(--text-muted); margin-top:8px; line-height:1.6; margin-bottom:32px; }
  .role-card{
    display:flex; align-items:center; gap:16px; background:var(--surface-800);
    border:1px solid var(--border-steel); border-radius:16px; padding:18px 20px;
    margin-bottom:14px; cursor:pointer; text-align:left; transition:border-color 0.15s;
  }
  .role-card:active{ border-color:var(--accent-amber); }
  .role-icon{ font-size:32px; flex-shrink:0; }
  .role-name{ font-size:16px; font-weight:700; }
  .role-desc{ font-size:12.5px; color:var(--text-muted); margin-top:2px; }
  .role-arrow{ margin-left:auto; color:var(--text-muted); font-size:20px; }
</style>
</head>
<body>

<div class="wrap">
  <img src="icon-192.png" class="logo-icon" alt="Xe Nhà" onerror="this.style.display='none'">
  <h1>Đối tác Xe Nhà</h1>
  <div class="sub">Chọn đúng vai trò của bạn để tiếp tục</div>

  <div class="role-card" onclick="location.href='cua-hang.html'">
    <div class="role-icon">🍜</div>
    <div>
      <div class="role-name">Cửa hàng đồ ăn</div>
      <div class="role-desc">Quán ăn, quán cafe — quản lý thực đơn, đơn hàng</div>
    </div>
    <div class="role-arrow">›</div>
  </div>

  <div class="role-card" onclick="location.href='tai-xe.html'">
    <div class="role-icon">🚕</div>
    <div>
      <div class="role-name">Tài xế</div>
      <div class="role-desc">Nhận chuyến xe, đơn giao hàng</div>
    </div>
    <div class="role-arrow">›</div>
  </div>

  <div class="role-card" onclick="location.href='phong-kham.html'">
    <div class="role-icon">🏥</div>
    <div>
      <div class="role-name">Phòng khám</div>
      <div class="role-desc">Quản lý khoa khám, lịch hẹn</div>
    </div>
    <div class="role-arrow">›</div>
  </div>

  <div class="role-card" onclick="location.href='lam-dep.html'">
    <div class="role-icon">💅</div>
    <div>
      <div class="role-name">Làm đẹp</div>
      <div class="role-desc">Salon, spa, nail — dịch vụ, lịch hẹn, quảng cáo</div>
    </div>
    <div class="role-arrow">›</div>
  </div>
</div>

</body>
</html>
